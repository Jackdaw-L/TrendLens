name: Update TrendLens recommendations

on:
  schedule:
    # 07:37 Asia/Shanghai. GitHub cron uses UTC; avoid top-of-hour scheduling delays.
    - cron: "37 23 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: Why this run was started
        required: false
        default: manual
      source:
        description: Trigger source
        required: false
        default: github
      triggered_at:
        description: Client trigger timestamp
        required: false
        default: ""

concurrency:
  group: trendlens-pipeline
  cancel-in-progress: false

jobs:
  update-recommendations:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_URL: https://api.deepseek.com/chat/completions
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_THINKING: disabled
      DEEPSEEK_MAX_TOKENS: "12000"
      DEEPSEEK_ATTEMPTS: "2"
      DEEPSEEK_TIMEOUT_MS: "180000"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      MAX_ITEMS_PER_SOURCE: "5"
      FETCH_ATTEMPTS: "3"
      LLM_CANDIDATE_ARTICLES: "24"
      LLM_MAX_ARTICLES: "10"
      LLM_SELECT_CONTENT_CHARS: "900"
      FRIDAY_REWRITE_ATTEMPTS: "3"
      FRIDAY_REWRITE_CONTENT_CHARS: "12000"
      FRIDAY_REWRITE_MIN_CHINESE_CHARS: "800"
      FRIDAY_MIN_CONTENT_CHARS: "400"
      REWRITE_REVIEW_ENABLED: "1"
      LLM_SELECT_SYSTEM_PROMPT_PATH: prompts/select-system.md
      LLM_SELECT_USER_PROMPT_PATH: prompts/select-user.md
      LLM_REWRITE_SYSTEM_PROMPT_PATH: prompts/rewrite-system.md
      LLM_REWRITE_USER_PROMPT_PATH: prompts/rewrite-user.md
      LLM_REVIEW_SYSTEM_PROMPT_PATH: prompts/review-system.md
      LLM_REVIEW_USER_PROMPT_PATH: prompts/review-user.md
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Set up pnpm
        run: npm install -g pnpm@10.18.0

      - name: Install dependencies
        run: pnpm install --prod --no-frozen-lockfile --ignore-scripts

      - name: Run RSS, selection, rewrite, and Supabase persistence
        run: npm run pipeline

      - name: Revalidate Netlify app cache
        env:
          TRENDLENS_REVALIDATE_URL: ${{ secrets.TRENDLENS_REVALIDATE_URL }}
          TRENDLENS_REVALIDATE_TOKEN: ${{ secrets.TRENDLENS_REVALIDATE_TOKEN }}
        run: |
          if [ -z "$TRENDLENS_REVALIDATE_URL" ] || [ -z "$TRENDLENS_REVALIDATE_TOKEN" ]; then
            echo "Skipping revalidation because TRENDLENS_REVALIDATE_URL or TRENDLENS_REVALIDATE_TOKEN is not configured."
            exit 0
          fi

          curl -fsS -X POST "$TRENDLENS_REVALIDATE_URL" \
            -H "authorization: Bearer $TRENDLENS_REVALIDATE_TOKEN"

      # 重新验证之后主动访问一遍关键页面，把新鲜 ISR 结果提前烤进 CDN，
      # 避免早晨第一位访问者（也就是用户本人）撞上冷函数 SSR 的 2~4 秒 TTFB。
      - name: Warm up production cache
        env:
          TRENDLENS_REVALIDATE_URL: ${{ secrets.TRENDLENS_REVALIDATE_URL }}
        run: |
          BASE_URL="${TRENDLENS_REVALIDATE_URL%/api/revalidate}"
          if [ -z "$BASE_URL" ] || [ "$BASE_URL" = "$TRENDLENS_REVALIDATE_URL" ]; then
            BASE_URL="https://trendlensapp.netlify.app"
          fi
          echo "Warming $BASE_URL"

          curl -fsS -o /dev/null -m 30 "$BASE_URL/" || echo "warmup / failed"
          curl -fsS -o /dev/null -m 30 "$BASE_URL/saved" || echo "warmup /saved failed"
          curl -fsS -o /dev/null -m 30 "$BASE_URL/settings" || echo "warmup /settings failed"

          if curl -fsS -m 30 "$BASE_URL/api/radar" -o /tmp/radar.json; then
            for id in $(jq -r '.articles[].id' /tmp/radar.json | head -12); do
              curl -fsS -o /dev/null -m 30 "$BASE_URL/articles/$id" \
                && echo "warmed /articles/$id" \
                || echo "warmup /articles/$id failed"
            done
          else
            echo "warmup skipped: /api/radar unreachable"
          fi
